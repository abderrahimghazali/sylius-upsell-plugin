services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    Abderrahim\SyliusUpsellPlugin\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/DependencyInjection/'
            - '../src/SyliusUpsellPlugin.php'
            - '../src/Form/Type/UpsellOfferType.php'

    # Phase 1 — Frequently Bought Together
    Abderrahim\SyliusUpsellPlugin\Repository\UpsellRelationRepository: ~

    Abderrahim\SyliusUpsellPlugin\Service\UpsellConfigurationProvider: ~

    Abderrahim\SyliusUpsellPlugin\Service\FrequentlyBoughtTogetherResolver:
        arguments:
            $cache: '@cache.app'

    Abderrahim\SyliusUpsellPlugin\Twig\UpsellExtension:
        tags: ['twig.extension']

    Abderrahim\SyliusUpsellPlugin\EventListener\AdminMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addAdminMenuItems }

    Abderrahim\SyliusUpsellPlugin\EventListener\ProductFormListener: ~

    Abderrahim\SyliusUpsellPlugin\Controller\Admin\UpsellConfigurationController:
        public: true

    # Phase 2 — Post-Purchase Upsell
    Abderrahim\SyliusUpsellPlugin\Form\Type\UpsellOfferType:
        arguments:
            $dataClass: '%upsell.model.offer.class%'
            $validationGroups: ['Default']
        tags: ['form.type']

    Abderrahim\SyliusUpsellPlugin\Repository\UpsellOfferRepository: ~

    Abderrahim\SyliusUpsellPlugin\Service\PostPurchaseOfferResolver: ~

    Abderrahim\SyliusUpsellPlugin\Controller\Shop\PostPurchaseController:
        public: true
        arguments:
            $orderRepository: '@sylius.repository.order'
            $cartContext: '@sylius.context.cart'
            $orderModifier: '@sylius.modifier.order'
            $orderItemQuantityModifier: '@sylius.modifier.order_item_quantity'
            $orderItemFactory: '@sylius.factory.order_item'
            $csrfTokenManager: '@security.csrf.token_manager'

    # Phase 3 — Analytics
    Abderrahim\SyliusUpsellPlugin\Repository\UpsellImpressionRepository: ~

    Abderrahim\SyliusUpsellPlugin\Service\UpsellAnalyticsService: ~

    Abderrahim\SyliusUpsellPlugin\Controller\Shop\ImpressionController:
        public: true

    Abderrahim\SyliusUpsellPlugin\Controller\Admin\UpsellAnalyticsController:
        public: true

    Abderrahim\SyliusUpsellPlugin\Controller\Admin\UpsellOfferController:
        public: true
        arguments:
            $offerRepository: '@upsell.repository.offer'
            $offerFactory: '@upsell.factory.offer'
